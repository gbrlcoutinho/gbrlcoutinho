name: Generate Snake

on:
  # Roda automaticamente a cada 24 horas
  schedule:
    - cron: "0 0 * * *" 
  # Permite rodar manualmente na aba Actions
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          # Seu usuário do GitHub vem automático aqui
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            # Versão Light (Fundo claro)
            dist/github-contribution-grid-snake.svg?color_snake=#8844fc&color_dots=#ebedf0,#e3d4ff,#cdaeff,#a673ff,#8844fc
            # Versão Dark (Fundo escuro #161b22) - Cobra Roxa
            dist/github-contribution-grid-snake-dark.svg?color_snake=#8844fc&color_dots=#161b22,#e3d4ff,#cdaeff,#a673ff,#8844fc

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
